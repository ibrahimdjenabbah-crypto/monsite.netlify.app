<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Demande d'admission - Complexe Scolaire Ibrahima Bah</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- En-tête -->
    <header>
        <h1>Complexe Scolaire Ibrahima Bah</h1>
        <p>Éducation - Excellence - Engagement</p>
    </header>

    <!-- Menu de navigation -->
    <nav>
        <a href="index.html">Accueil</a>
        <a href="a_propos.html">À propos</a>
        <a href="Programme.html">Programmes</a>
        <a href="Admissions.html">Admissions</a>
        <a href="galerie.html">Galerie</a>
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Formulaire de demande -->
    <section>
        <h2>Demande d'admission en ligne</h2>
        <form action="#" method="post">
            <label for="nom">Nom complet de l'élève *</label>
            <input type="text" id="nom" name="nom" required>

            <label for="naissance">Date de naissance *</label>
            <input type="date" id="naissance" name="naissance" required>

            <label for="niveau">Niveau souhaité *</label>
            <select id="niveau" name="niveau" required>
                <option value="">-- Sélectionnez un niveau --</option>
                <option value="maternelle">Maternelle</option>
                <option value="primaire">Primaire</option>
                <option value="college">Collège</option>
                <option value="lycee">Lycée</option>
            </select>

            <label for="parent">Nom du parent ou tuteur *</label>
            <input type="text" id="parent" name="parent" required>

            <label for="telephone">Téléphone *</label>
            <input type="tel" id="telephone" name="telephone" required>

            <label for="email">Adresse email</label>
            <input type="email" id="email" name="email">

            <label for="message">Informations complémentaires</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <button type="submit">Envoyer la demande</button>
        </form>
    </section>

    <!-- Pied de page -->
    <footer>
        <p>&copy; 2025 Complexe Scolaire Ibrahima Bah | Tous droits réservés</p>
    </footer>

</body>
</html>
